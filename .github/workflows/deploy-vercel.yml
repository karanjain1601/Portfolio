name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_CHAT_API_URL: ${{ secrets.NEXT_PUBLIC_CHAT_API_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_CHAT_MODEL: ${{ secrets.OPENROUTER_CHAT_MODEL }}
      OPENROUTER_EMBED_MODEL: ${{ secrets.OPENROUTER_EMBED_MODEL }}
      OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
      OPENROUTER_REFERER: ${{ secrets.OPENROUTER_REFERER }}
      OPENROUTER_APP_NAME: ${{ secrets.OPENROUTER_APP_NAME }}
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      QDRANT_COLLECTION: ${{ secrets.QDRANT_COLLECTION }}
      RAG_TOP_K: ${{ secrets.RAG_TOP_K }}
      RAG_ADMIN_TOKEN: ${{ secrets.RAG_ADMIN_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Build and deploy preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          EXTRA_ARGS=()
          add_env_if_present() {
            local key="$1"
            local value="${!key:-}"
            if [ -n "$value" ]; then
              EXTRA_ARGS+=(--build-env "$key=$value")
              EXTRA_ARGS+=(--env "$key=$value")
            fi
          }

          add_env_if_present NEXT_PUBLIC_CHAT_API_URL
          add_env_if_present OPENROUTER_API_KEY
          add_env_if_present OPENROUTER_CHAT_MODEL
          add_env_if_present OPENROUTER_EMBED_MODEL
          add_env_if_present OPENROUTER_BASE_URL
          add_env_if_present OPENROUTER_REFERER
          add_env_if_present OPENROUTER_APP_NAME
          add_env_if_present QDRANT_URL
          add_env_if_present QDRANT_API_KEY
          add_env_if_present QDRANT_COLLECTION
          add_env_if_present RAG_TOP_K
          add_env_if_present RAG_ADMIN_TOKEN

          EXTRA_ARGS+=(--build-env STATIC_EXPORT=false)
          EXTRA_ARGS+=(--env STATIC_EXPORT=false)

          vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"
          vercel build --token "$VERCEL_TOKEN" "${EXTRA_ARGS[@]}"
          vercel deploy --prebuilt --token "$VERCEL_TOKEN" "${EXTRA_ARGS[@]}"

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_CHAT_API_URL: ${{ secrets.NEXT_PUBLIC_CHAT_API_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_CHAT_MODEL: ${{ secrets.OPENROUTER_CHAT_MODEL }}
      OPENROUTER_EMBED_MODEL: ${{ secrets.OPENROUTER_EMBED_MODEL }}
      OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
      OPENROUTER_REFERER: ${{ secrets.OPENROUTER_REFERER }}
      OPENROUTER_APP_NAME: ${{ secrets.OPENROUTER_APP_NAME }}
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      QDRANT_COLLECTION: ${{ secrets.QDRANT_COLLECTION }}
      RAG_TOP_K: ${{ secrets.RAG_TOP_K }}
      RAG_ADMIN_TOKEN: ${{ secrets.RAG_ADMIN_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Build and deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          EXTRA_ARGS=()
          add_env_if_present() {
            local key="$1"
            local value="${!key:-}"
            if [ -n "$value" ]; then
              EXTRA_ARGS+=(--build-env "$key=$value")
              EXTRA_ARGS+=(--env "$key=$value")
            fi
          }

          add_env_if_present NEXT_PUBLIC_CHAT_API_URL
          add_env_if_present OPENROUTER_API_KEY
          add_env_if_present OPENROUTER_CHAT_MODEL
          add_env_if_present OPENROUTER_EMBED_MODEL
          add_env_if_present OPENROUTER_BASE_URL
          add_env_if_present OPENROUTER_REFERER
          add_env_if_present OPENROUTER_APP_NAME
          add_env_if_present QDRANT_URL
          add_env_if_present QDRANT_API_KEY
          add_env_if_present QDRANT_COLLECTION
          add_env_if_present RAG_TOP_K
          add_env_if_present RAG_ADMIN_TOKEN

          EXTRA_ARGS+=(--build-env STATIC_EXPORT=false)
          EXTRA_ARGS+=(--env STATIC_EXPORT=false)

          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel build --prod --token "$VERCEL_TOKEN" "${EXTRA_ARGS[@]}"
          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" "${EXTRA_ARGS[@]}"
