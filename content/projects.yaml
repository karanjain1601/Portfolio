- slug: cubix-ai
  title: CUBIX AI
  summary: A Python-based Rubik's Cube simulator and visual solver that compares multiple solving algorithms and heuristics.
  description: |
    Built with Python and Pygame, with NumPy for state operations and OpenPyXL for result handling.
    Simulates a 3x3 cube, supports random scramble generation, and renders a 2D interactive GUI.
    Includes multiple solving approaches: Kociemba (twophase), Layer-by-Layer, BFS, Better BFS, A*, IDA*, and Mini.
    Implements custom cube state representation, move parsing/cleaning, Manhattan-distance heuristic utilities, and solution path translation for algorithm benchmarking.
  tech: [Python, Pygame, NumPy, Kociemba twophase, Search Algorithms, Heuristics]
  role: Solo
  period: "2026"
  links:
    repo: https://github.com/karanjain1601/CUBIX-AI_cube_solving_algorithms
  cover: /projects/cubix-ai.png
  featured: true

- slug: gangsofbots
  title: GangsOfBots
  summary: A full-stack autonomous AI software organization that turns requirements into reviewed artifacts, code, tests, and release bundles with human approval gates.
  description: |
    Built with Next.js 14, TypeScript, Tailwind CSS, and FastAPI.
    Orchestrates six AI agents (BA, Architect, Developer, QA, DevOps, and Manager) in a stage-based workflow with typed JSON outputs and validation.
    Supports real-time token streaming over WebSocket, role-based auth (viewer/reviewer/admin), audit trails, analytics, and organizational memory.
    Uses SQLite persistence, Alembic migrations, and Ollama-powered local LLMs for agent execution.
    Includes approval-driven git release bundle generation and comprehensive backend/frontend test coverage.
