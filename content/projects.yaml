- slug: dashfolio
  title: DashFolio
  summary: A full-stack personal trading dashboard for equities, mutual funds, F&O, and crypto with live alerts and multi-agent AI analysis.
  description: |
    Built with Next.js 14, TypeScript, Tailwind CSS, and FastAPI.
    Tracks portfolio transactions across asset classes with precise Decimal-based P&L.
